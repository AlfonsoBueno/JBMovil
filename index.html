<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>¡Huye Tigre, Huye!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      width: 100%; height: 100%;
      /* iOS Safari: fill the real viewport without address-bar gap */
      height: -webkit-fill-available;
    }
    body {
      width: 100%; height: 100vh; height: 100dvh;
      overflow: hidden; position: fixed; top: 0; left: 0;
      background: #0d0d1a; touch-action: none; -webkit-tap-highlight-color: transparent;
    }
    #game {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
    }
    canvas {
      display: block;
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      touch-action: none;
    }
    /* aviso de orientación — portrait en cualquier tamaño */
    #rotate {
      position: fixed; inset: 0; display: none; z-index: 9999;
      background: #0d0d1a; color: #fff; font-family: monospace;
      flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 32px; font-size: 22px;
      line-height: 1.8;
    }
    @media (orientation: portrait) {
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="rotate">
    <div style="font-size:64px">🔄</div>
    <br>
    <strong>Gira el móvil</strong><br>
    El juego funciona en horizontal<br>
    <span style="font-size:14px;color:#aaa">¡Huye Tigre, Huye! 🐯</span>
  </div>

  <script src="vendor/phaser.min.js"></script>
  <script src="src/config.js"></script>
  <script src="src/sfx.js"></script>
  <script src="src/controls.js"></script>
  <script src="src/scenes/Preload.js"></script>
  <script src="src/scenes/Menu.js"></script>
  <script src="src/scenes/Game.js"></script>
  <script src="src/scenes/End.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
